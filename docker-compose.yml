services:
  postgres:
    image: postgres:14-alpine
    container_name: liferemind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: life_remind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: