version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: liferemind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: life_remind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: liferemind-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres_dev_password@postgres:5432/life_remind
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
